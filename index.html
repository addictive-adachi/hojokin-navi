<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HojokinNavi - AI補助金マッチングポータル β版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-text:#0C447C;
  --green:#3B6D11;--green-light:#EAF3DE;--green-text:#27500A;
  --amber:#854F0B;--amber-light:#FAEEDA;--amber-text:#633806;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-text:#3C3489;
  --teal:#0F6E56;--teal-light:#E1F5EE;--teal-text:#085041;
  --bg:#f5f5f3;--bg2:#ffffff;--bg3:#f1efe8;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --text:#1a1a18;--text2:#6b6a64;--text3:#9c9a92;
  --radius-md:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--bg2:#242422;--bg3:#2c2c2a;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
    --text:#e8e6dc;--text2:#9c9a92;--text3:#6b6a64;
    --blue-light:#0c2a45;--blue-text:#85B7EB;
    --green-light:#0d2010;--green-text:#97C459;
    --amber-light:#2a1a05;--amber-text:#FAC775;
    --purple-light:#1e1c3a;--purple-text:#AFA9EC;
    --teal-light:#042c24;--teal-text:#5DCAA5;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;}

/* ── layout ── */
.portal{display:grid;grid-template-rows:52px 1fr;min-height:100vh;}
.header{background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:10;}
.logo-icon{width:28px;height:28px;border-radius:6px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{font-size:15px;font-weight:600;}
.logo-text span{color:var(--blue);}
.header-badge{margin-left:auto;background:var(--blue-light);color:var(--blue-text);font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;}
.body{display:grid;grid-template-columns:1fr 3fr;height:calc(100vh - 52px);}

/* ── chat pane ── */
.chat-pane{background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:14px 16px 10px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.chat-header-title{font-size:13px;font-weight:600;}
.chat-header-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.step-bar{display:flex;gap:4px;margin-top:10px;}
.step-dot{height:4px;border-radius:2px;flex:1;background:var(--border);}
.step-dot.done{background:var(--blue);}
.step-dot.active{background:#378ADD;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.avatar.navi{background:var(--blue-light);color:var(--blue-text);}
.avatar.user{background:var(--bg3);color:var(--text2);}
.bubble{max-width:82%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;border:0.5px solid var(--border);background:var(--bg3);}
.msg.user .bubble{background:var(--blue-light);border-color:transparent;color:var(--blue-text);}
.choices{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;padding-left:36px;}
.choice-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;transition:all .15s;}
.choice-btn:hover{background:var(--blue-light);color:var(--blue-text);border-color:var(--blue);}
.chat-input-area{padding:10px 14px;border-top:0.5px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--bg2);}
.chat-input{flex:1;border:0.5px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-family:inherit;}
.chat-input:focus{border-color:var(--blue);}
.chat-input:disabled{opacity:.5;}
.send-btn{padding:8px 16px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;}
.send-btn:hover{background:var(--blue-text);}
.send-btn:disabled{opacity:.4;cursor:default;}

/* ── result pane ── */
.result-pane{background:var(--bg3);display:flex;flex-direction:column;overflow:hidden;}
.result-header{padding:0;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.result-tabs{display:flex;}
.rtab{flex:1;padding:14px 10px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .15s;}
.rtab.active{border-bottom-color:var(--blue);color:var(--blue);}
.result-sub{font-size:11px;color:var(--text2);padding:6px 16px 8px;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.result-content{flex:1;overflow-y:auto;padding:12px;}

/* ── summary bar ── */
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sum-card{background:var(--bg2);border-radius:var(--radius-md);padding:10px;text-align:center;border:0.5px solid var(--border);}
.sum-num{font-size:20px;font-weight:600;color:var(--blue);}
.sum-label{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── grant card ── */
.grant-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.gc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.gc-badge{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.badge-meti{background:var(--blue-light);color:var(--blue-text);}
.badge-mhlw{background:var(--green-light);color:var(--green-text);}
.gc-title{font-size:13px;font-weight:500;flex:1;line-height:1.4;}
.gc-score{font-size:18px;font-weight:600;flex-shrink:0;}
.gc-score.high{color:#3B6D11;}
.gc-score.mid{color:#BA7517;}
.meter-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.meter-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.fill-high{background:#639922;}
.fill-mid{background:#EF9F27;}
.gc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.meta-chip{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 7px;border-radius:4px;border:0.5px solid var(--border);}
.req-label,.sched-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.req-row{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:4px;}
.req-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#639922;}
.dot-warn{background:#EF9F27;}
.dot-no{background:#E24B4A;}
.req-section{margin-bottom:12px;}
.sched-row{display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.sched-row:last-child{border-bottom:none;}
.sched-mo{width:72px;color:var(--text2);flex-shrink:0;padding-top:1px;}
.sched-bar{width:8px;display:flex;flex-direction:column;align-items:center;padding-top:4px;}
.sched-circle{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.sched-line-v{width:1px;flex:1;background:var(--border);margin-top:3px;min-height:16px;}
.sched-text{flex:1;line-height:1.5;padding-bottom:4px;}

/* ── SR recommended banner inside grant card ── */
.sr-banner{margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px;}
.sr-banner-label{font-size:11px;font-weight:600;color:var(--purple-text);background:var(--purple-light);padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.sr-mini-card{display:flex;align-items:center;gap:10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;cursor:pointer;transition:border-color .15s;}
.sr-mini-card:hover{border-color:var(--purple);}
.sr-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple-light);color:var(--purple-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.sr-mini-info{flex:1;min-width:0;}
.sr-mini-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-mini-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.sr-mini-match{font-size:12px;font-weight:600;color:var(--purple-text);flex-shrink:0;}
.sr-more-btn{width:100%;margin-top:6px;padding:6px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sr-more-btn:hover{background:var(--purple-light);color:var(--purple-text);border-color:var(--purple);}

/* ── SR search pane ── */
.sr-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sr-filter-bar select,.sr-filter-bar input{padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-md);background:var(--bg2);color:var(--text);font-size:12px;outline:none;font-family:inherit;}
.sr-filter-bar input{flex:1;min-width:120px;}
.sr-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.sr-card:hover{border-color:var(--purple);}
.sr-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.sr-av-lg{width:44px;height:44px;border-radius:50%;background:var(--purple-light);color:var(--purple-text);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;}
.sr-info{flex:1;}
.sr-name{font-size:14px;font-weight:600;}
.sr-office{font-size:12px;color:var(--text2);margin-top:2px;}
.sr-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.sr-tag{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--teal-light);color:var(--teal-text);border:0.5px solid transparent;}
.sr-tag.matched{background:var(--purple-light);color:var(--purple-text);}
.sr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.sr-stat{text-align:center;background:var(--bg3);border-radius:6px;padding:6px;}
.sr-stat-num{font-size:15px;font-weight:600;color:var(--text);}
.sr-stat-label{font-size:10px;color:var(--text2);margin-top:1px;}
.sr-actions{display:flex;gap:8px;}
.btn-contact{flex:1;padding:8px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;}
.btn-contact:hover{background:var(--purple-text);}
.btn-detail{padding:8px 14px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-md);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-detail:hover{background:var(--bg3);}
.sr-match-badge{background:var(--purple-light);color:var(--purple-text);font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;}

/* ── modal overlay ── */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:var(--radius-lg);border:0.5px solid var(--border);width:340px;max-width:90%;padding:20px;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.modal-field{margin-bottom:12px;}
.modal-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
.modal-field input,.modal-field textarea{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-md);padding:8px 10px;font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-family:inherit;}
.modal-field textarea{resize:vertical;min-height:72px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-submit{flex:1;padding:9px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:9px 16px;background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-md);font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;}

/* ── placeholder ── */
.placeholder-msg{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:1.8;}

/* ── horizontal comparison layout ── */
.compare-wrap{display:flex;flex-direction:column;gap:0;}
.compare-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.compare-header-row{display:grid;grid-template-columns:120px repeat(3,1fr);gap:0;margin-bottom:0;position:sticky;top:0;z-index:2;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;overflow:hidden;}
.compare-row{display:grid;grid-template-columns:120px repeat(3,1fr);gap:0;border-left:0.5px solid var(--border);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);}
.compare-row:last-child{border-radius:0 0 var(--radius-lg) var(--radius-lg);}
.compare-row-label{padding:10px 10px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;background:var(--bg3);border-right:0.5px solid var(--border);display:flex;align-items:flex-start;line-height:1.4;}
.compare-cell{padding:10px 12px;border-right:0.5px solid var(--border);font-size:12px;line-height:1.5;}
.compare-cell:last-child{border-right:none;}
.compare-cell.alt{background:var(--bg3);}
.col-head{padding:10px 12px;font-size:12px;font-weight:600;border-right:0.5px solid var(--border);background:var(--bg2);}
.col-head:last-child{border-right:none;}
.col-head-label{padding:10px 10px;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg3);border-right:0.5px solid var(--border);}
.score-big{font-size:22px;font-weight:700;}
.score-big.high{color:#3B6D11;}
.score-big.mid{color:#BA7517;}

/* ── loading ── */
.loading-dots{display:inline-flex;gap:3px;vertical-align:middle;}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;display:inline-block;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

@media(max-width:640px){
  .body{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
  .chat-pane{border-right:none;border-bottom:0.5px solid var(--border);}
}
</style>
</head>
<body>
<div class="portal" style="position:relative;">

<!-- header -->
<div class="header">
  <div class="logo-icon">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="2" y="2" width="5" height="5" rx="1" fill="white" opacity=".9"/>
      <rect x="9" y="2" width="5" height="5" rx="1" fill="white" opacity=".7"/>
      <rect x="2" y="9" width="5" height="5" rx="1" fill="white" opacity=".7"/>
      <rect x="9" y="9" width="5" height="5" rx="1" fill="white" opacity=".5"/>
    </svg>
  </div>
  <div class="logo-text">Hojokin<span>Navi</span></div>
  <div class="header-badge">β版 デモ</div>
</div>

<div class="body">
  <!-- chat pane -->
  <div class="chat-pane">
    <div class="chat-header">
      <div class="chat-header-title">AI 補助金ナビ</div>
      <div class="chat-header-sub">企業情報を入力すると最適な補助金・助成金と社労士をご提案します</div>
      <div class="step-bar">
        <div class="step-dot active" id="sd0"></div>
        <div class="step-dot" id="sd1"></div>
        <div class="step-dot" id="sd2"></div>
        <div class="step-dot" id="sd3"></div>
        <div class="step-dot" id="sd4"></div>
        <div class="step-dot" id="sd5"></div>
      </div>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" placeholder="メッセージを入力..." disabled/>
      <button class="send-btn" id="sendBtn" onclick="handleSend()" disabled>送信</button>
    </div>
  </div>

  <!-- result pane -->
  <div class="result-pane">
    <div class="result-header">
      <div class="result-tabs">
        <div class="rtab active" id="tab-grant" onclick="switchTab('grant')">補助金・助成金</div>
        <div class="rtab" id="tab-sr" onclick="switchTab('sr')">社労士を探す</div>
      </div>
    </div>
    <div class="result-sub" id="resultSub">チャットで企業情報を入力すると結果が表示されます</div>
    <div class="result-content" id="resultContent">
      <div class="placeholder-msg">左のチャットで企業情報を入力してください<br>補助金・助成金と担当社労士が<br>自動でご提案されます</div>
    </div>
  </div>
</div>

<!-- contact modal -->
<div class="modal-overlay" id="contactModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">相談を申し込む</div>
    <div class="modal-sub" id="modalSub">無料相談の申し込みフォーム</div>
    <div class="modal-field">
      <label>お名前・会社名</label>
      <input type="text" placeholder="例：山田太郎 / 株式会社○○"/>
    </div>
    <div class="modal-field">
      <label>メールアドレス</label>
      <input type="email" placeholder="example@company.co.jp"/>
    </div>
    <div class="modal-field">
      <label>ご相談内容（任意）</label>
      <textarea placeholder="気になる補助金や現在の状況などをご記入ください"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-submit" onclick="submitContact()">送信する</button>
    </div>
  </div>
</div>

</div><!-- /portal -->

<script>
/* ─────── DATA ─────── */
const FLOW=[
  {text:'こんにちは！AI補助金ナビです。御社に最適な補助金・助成金と社労士をご提案します。\nまず、業種を教えてください。',choices:['製造業','IT・ソフトウェア','飲食・サービス業','建設業','小売業','医療・介護','その他'],key:'industry'},
  {text:'ありがとうございます。従業員数を教えてください。',choices:['1〜5名','6〜20名','21〜50名','51〜100名','101名以上'],key:'employees'},
  {text:'設立からの年数はどれくらいですか？',choices:['創業1年未満','1〜3年','3〜5年','5〜10年','10年以上'],key:'age'},
  {text:'最も力を入れたい取り組みを選んでください。',choices:['設備・機械の導入','DX・ITシステム導入','新商品・新サービス開発','採用・人材育成','販路拡大','事業承継・M&A'],key:'goal'},
  {text:'直近の売上高（概算）を教えてください。',choices:['1,000万円未満','1,000〜5,000万円','5,000万円〜1億円','1億〜5億円','5億円以上'],key:'revenue'},
  {text:'補助金・助成金の支給をご希望の時期はいつ頃ですか？\nスケジュールの逆算にご活用します。',choices:['3ヶ月以内（急ぎ）','6ヶ月以内','1年以内','1〜2年以内','時期はまだ未定'],key:'deadline'}
];

const GRANTS=[
  {id:'monodukuri',title:'ものづくり・商業・サービス生産性向上促進補助金',badge:'経産省',badgeClass:'badge-meti',score:82,scoreClass:'high',fillClass:'fill-high',max:'最大1,250万円',rate:'1/2〜2/3補助',deadline:'次回: 2025年6月',
    reqs:[{ok:'ok',text:'中小企業・小規模事業者に該当'},{ok:'ok',text:'付加価値額向上の事業計画がある'},{ok:'warn',text:'事業計画書（認定支援機関の確認印が必要）'},{ok:'no',text:'GビズIDプライムアカウントの取得'}],

/* ─────── TAB ─────── */
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-grant').className='rtab'+(tab==='grant'?' active':'');
  document.getElementById('tab-sr').className='rtab'+(tab==='sr'?' active':'');
  if(!analysisComplete){
    resultContent.innerHTML='<div class="placeholder-msg">チャットで企業情報を入力すると<br>結果が表示されます</div>';
    return;
  }
  if(tab==='grant') renderGrants();
  else renderSRSearch();
}

/* ─────── CHAT ─────── */
function addMsg(from,html,choices){
  const div=document.createElement('div');
  div.className='msg '+from;
  const av=document.createElement('div');
  av.className='avatar '+from;
  av.textContent=from==='navi'?'AI':'あ';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.innerHTML=html.replace(/\n/g,'<br>');
  if(from==='navi')div.appendChild(av);
  div.appendChild(bub);
  if(from==='user')div.appendChild(av);
  msgs.appendChild(div);
  if(choices&&choices.length){
    const cDiv=document.createElement('div');
    cDiv.className='choices';
    const cid='c_'+Date.now();
    cDiv.id=cid;
    choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.textContent=c;
      btn.onclick=()=>pick(c,cid);
      cDiv.appendChild(btn);
    });
    msgs.appendChild(cDiv);
  }
  msgs.scrollTop=msgs.scrollHeight;
}

function updateBar(s){
  for(let i=0;i<6;i++){
    const d=document.getElementById('sd'+i);
    if(!d)continue;
    d.className='step-dot'+(i<s?' done':i===s?' active':'');
  }
}

function pick(val,cid){
  const el=document.getElementById(cid);
  if(el)el.remove();
  answers[FLOW[stepIdx].key]=val;
  addMsg('user',val);
  stepIdx++;
  updateBar(stepIdx);
  if(stepIdx<FLOW.length) setTimeout(()=>addMsg('navi',FLOW[stepIdx].text,FLOW[stepIdx].choices),400);
  else setTimeout(showAnalyzing,400);
}

function showAnalyzing(){
  const div=document.createElement('div');
  div.className='msg navi';
  div.id='analyzing';
  div.innerHTML='<div class="avatar navi">AI</div><div class="bubble">補助金データベースと社労士データベースを照合しています <span class="loading-dots"><span></span><span></span><span></span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{
    document.getElementById('analyzing')&&document.getElementById('analyzing').remove();
    addMsg('navi','分析が完了しました！\n\n適合する補助金・助成金が <strong>3件</strong>、それぞれに対応できる社労士が <strong>4名</strong> 見つかりました。\n支給希望時期「'+( answers.deadline||'未定')+'」をもとにスケジュールを逆算しています。\n右側のパネルで確認できます。\n\nご質問があればお気軽にどうぞ。');
    input.disabled=false; sendBtn.disabled=false;
    input.placeholder='例：ものづくり補助金の条件は？';
    analysisComplete=true;
    renderGrants();
    resultSub.textContent=(answers.industry||'')+'・'+(answers.employees||'')+'の企業 — 補助金3件 / 社労士4名';
  },2400);
}

function handleSend(){
  const v=input.value.trim();
  if(!v)return;
  addMsg('user',v);
  input.value='';
  const div=document.createElement('div');
  div.className='msg navi';
  div.id='rep';
  div.innerHTML='<div class="avatar navi">AI</div><div class="bubble"><span class="loading-dots"><span></span><span></span><span></span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{document.getElementById('rep')&&document.getElementById('rep').remove();addMsg('navi',getReply(v));},1100);
}
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});

function getReply(q){
  const l=q.toLowerCase();
  if(l.includes('社労士')||l.includes('専門家'))return '社労士タブから専門家を検索・絞り込みできます。補助金の種類・地域・得意分野で絞り込み可能です。各カードの「相談申し込み」から直接コンタクトできます。';
  if(l.includes('ものづく'))return 'ものづくり補助金は新製品・新サービス開発や生産プロセス改善を支援します。補助率1/2〜2/3、上限1,250万円。認定支援機関との連携が必須です。';
  if(l.includes('it')||l.includes('dx'))return 'デジタル化・AI導入補助金は業務効率化ツール導入を支援します。補助率1/2、上限150万円。GビズIDとIT導入支援事業者を通じた申請が必要です。';
  if(l.includes('申請')||l.includes('いつ'))return '申請の一般的な流れ：\n① GビズID取得（約2週間）\n② 事業計画書作成（2〜4週間）\n③ 公募期間内に電子申請\n④ 採択通知（1〜2ヶ月後）\n\n社労士に依頼すると採択率が上がります。';
  return '詳細は各補助金の公募要領をご確認の上、右の社労士タブから専門家にご相談ください。他にご質問はありますか？';
}

/* ─────── SCHEDULE GENERATOR ─────── */
function buildSchedule(grantId, deadlineAnswer){
  const urgent = deadlineAnswer==='3ヶ月以内（急ぎ）';
  const mid    = deadlineAnswer==='6ヶ月以内';
  const undef  = deadlineAnswer==='時期はまだ未定';

  const now = new Date();
  function addMonths(m){
    const d=new Date(now);
    d.setMonth(d.getMonth()+m);
    return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
  }

  // 警告バナーを出す条件
  let warning = null;
  if(urgent && (grantId==='monodukuri')){
    warning='⚠️ 3ヶ月以内の支給は難しい場合があります。ものづくり補助金は採択〜入金まで最短5〜6ヶ月かかります。';
  }
  if(urgent && grantId==='it'){
    warning='⚠️ IT導入補助金は最短3ヶ月での採択が可能ですが、入金は採択後2〜3ヶ月後になります。早急な準備が必要です。';
  }

  const schedules = {
    monodukuri: [
      {mo: addMonths(0)+' 今すぐ', text:'GビズIDプライムの申請（約2週間）'},
      {mo: addMonths(1),           text:'認定支援機関への相談・事業計画書の作成開始'},
      {mo: addMonths(2),           text:'事業計画書完成・電子申請システムで提出'},
      {mo: addMonths(4),           text:'採択通知・交付申請の手続き'},
      {mo: addMonths(urgent?5:6),  text:'事業実施・証拠書類の整備'},
      {mo: addMonths(urgent?6:8),  text:'実績報告・補助金の入金 🎯 '+(deadlineAnswer||'')},
    ],
    it: [
      {mo: addMonths(0)+' 今すぐ', text:'GビズID取得・IT導入支援事業者の選定'},
      {mo: addMonths(urgent?0:1),  text:'導入ツールの選定・見積もり確定'},
      {mo: addMonths(1),           text:'申請書類の作成・電子申請'},
      {mo: addMonths(urgent?2:3),  text:'採択通知・ツール導入開始'},
      {mo: addMonths(urgent?3:4),  text:'事業完了・実績報告'},
      {mo: addMonths(urgent?3:5),  text:'補助金の入金 🎯 '+(deadlineAnswer||'')},
    ],
    jinzai: [
      {mo: addMonths(0)+' 今すぐ', text:'訓練内容・研修機関の選定'},
      {mo: addMonths(1),           text:'訓練計画届を管轄の労働局へ提出（実施1ヶ月前まで必須）'},
      {mo: addMonths(urgent?1:2),  text:'研修の実施・出勤簿・賃金台帳の整備'},
      {mo: addMonths(urgent?2:3),  text:'研修終了・支給申請書の提出（終了後2ヶ月以内）'},
      {mo: addMonths(urgent?3:4),  text:'審査完了・助成金の入金 🎯 '+(deadlineAnswer||'')},
    ]
  };

  return { rows: schedules[grantId] || schedules.monodukuri, warning };
}

/* ─────── RENDER SR SEARCH ─────── */
function renderSRSearch(filterPref='',filterSpec='',filterName=''){
  const pref=filterPref.trim().toLowerCase();
  const spec=filterSpec.trim().toLowerCase();
  const name=filterName.trim().toLowerCase();
  let list=SR_DATA.filter(s=>{
    if(pref&&!s.pref.toLowerCase().includes(pref)&&!s.area.toLowerCase().includes(pref))return false;
    if(spec&&!s.specialties.some(t=>t.toLowerCase().includes(spec)))return false;
    if(name&&!s.name.toLowerCase().includes(name)&&!s.office.toLowerCase().includes(name))return false;
    return true;
  });

        <div class="sr-stat"><div class="sr-stat-num">${s.adoptions}</div><div class="sr-stat-label">採択実績</div></div>
        <div class="sr-stat"><div class="sr-stat-num">${s.clients}</div><div class="sr-stat-label">取引先数</div></div>
        <div class="sr-stat"><div class="sr-stat-num">${s.exp}年</div><div class="sr-stat-label">経験年数</div></div>
      </div>
      <div class="sr-actions">
        <button class="btn-contact" onclick="openContact('${s.id}')">無料相談を申し込む</button>
        <button class="btn-detail" onclick="alert('詳細ページは本番実装時に追加されます')">詳細を見る</button>
      </div>`;
    srList.appendChild(card);
  });
}

function applyFilter(){
  const name=document.getElementById('fName')?.value||'';
  const pref=document.getElementById('fPref')?.value||'';
  const spec=document.getElementById('fSpec')?.value||'';
  renderSRSearch(pref,spec,name);
}

/* ─────── MODAL ─────── */
function openContact(srId){
  const s=SR_DATA.find(x=>x.id===srId);
  if(!s)return;
  document.getElementById('modalTitle').textContent=s.name+' への相談申し込み';
  document.getElementById('modalSub').textContent=s.office+' / '+s.fee;
  document.getElementById('contactModal').className='modal-overlay open';
}
function closeModal(){
  document.getElementById('contactModal').className='modal-overlay';
}
function submitContact(){
  closeModal();
  setTimeout(()=>alert('送信しました！担当社労士より24時間以内にご連絡いたします。'),100);
}
document.getElementById('contactModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('contactModal'))closeModal();
});

/* ─────── BOOT ─────── */
setTimeout(()=>addMsg('navi',FLOW[0].text,FLOW[0].choices),300);
</script>
</body>
</html>
